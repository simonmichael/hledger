# stack build plan using GHC 9.12.4
# https://gitlab.haskell.org/ghc/ghc/-/wikis/migration/9.12
# https://downloads.haskell.org/ghc/9.12.1/docs/users_guide/9.12.1-notes.html
# https://downloads.haskell.org/ghc/9.12.2/docs/users_guide/9.12.2-notes.html
# https://downloads.haskell.org/ghc/9.12.2/docs/users_guide/9.12.3-notes.html
# https://downloads.haskell.org/ghc/9.12.4/docs/users_guide/9.12.4-notes.html

packages:
- hledger-lib
- hledger
- hledger-ui
- hledger-web

resolver: nightly-2026-06-01

extra-deps:
# https://haskell.github.io/security-advisories/advisory/HSEC-2026-0007.html
- aeson-2.3.0.0
- text-iso8601-0.2.0.0
allow-newer: true

nix:
  pure: false
  packages: [perl gmp ncurses zlib]

