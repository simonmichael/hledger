# stack build plan using GHC 9.8.4

resolver: lts-23.28

packages:
- hledger-lib
- hledger
- hledger-ui
- hledger-web

extra-deps:
- encoding-0.10
- hashtables-1.4.2
# #2410, #2512:
- haskeline-0.8.4.1
# https://haskell.github.io/security-advisories/advisory/HSEC-2026-0007.html
- aeson-2.3.0.0
- aeson-pretty-0.8.10
# use latest revision, not the rev0 in the snapshot:
- attoparsec-aeson-2.2.2.0
- text-iso8601-0.2.0.0
allow-newer: true

nix:
  pure: false
  packages: [perl gmp ncurses zlib]

