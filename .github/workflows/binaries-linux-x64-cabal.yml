# TRIGGER: Runs on any push to binaries-linux-x64-cabal or binaries branches.
# ACTION: Builds, unit-tests and saves the linux x64 binary with cabal - statically linked (musl)
# in an Alpine container. Part of the uniform binaries-*-cabal family (ghcup/haskell-actions-setup + cabal).
# This is the only fully-static build; mac/windows/linux-arm64 are dynamic.

name: binaries-linux-x64-cabal
on:
  push:
    branches: [ binaries-linux-x64-cabal, binaries ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    container: alpine:latest   # provides musl, the statically-linkable libc

    env:
      ghc:   "9.14.1"     # match stack.yaml / hx.toml
      cabal: "3.16.1.0"

    steps:

    - name: Show platform info
      run: |
        arch
        uname -a

    - name: Install system build deps (incl. static libs)
      run: |
        apk --no-cache add \
          gmp-dev gmp-static libffi-dev zlib-dev zlib-static ncurses-dev ncurses-static \
          binutils-gold curl gcc g++ git make xz tar perl file

    - name: Check out
      uses: actions/checkout@v7
      # have to fetch everything for git describe for --version
      with:
        fetch-depth: 0

    - name: Check embedded files
      run: |
        tools/checkembeddedfiles

    # CACHES. Like the hx workflows, we cache the toolchain and the compiled dependencies, but NOT
    # the project build (dist-newstyle) - that would risk a stale git-describe --version.

    - name: Cache - ~/.ghcup (ghc + cabal toolchain)
      uses: actions/cache@v6
      with:
        path: ~/.ghcup
        key: ${{ runner.os }}-x64-cabal-ghcup-${{ env.ghc }}-${{ env.cabal }}

    - name: Cache - ~/.cabal/store (compiled dependencies)
      uses: actions/cache@v6
      with:
        path: ~/.cabal/store
        key: ${{ runner.os }}-x64-cabal-store-${{ env.ghc }}-${{ hashFiles('cabal.project', '**/*.cabal') }}
        restore-keys: |
             ${{ runner.os }}-x64-cabal-store-${{ env.ghc }}-

    - name: Cache - ~/.cabal Hackage index & config (excluding store)
      uses: actions/cache@v6
      with:
        path: |
          ~/.cabal/packages
          ~/.cabal/config
        key: ${{ runner.os }}-x64-cabal-index-${{ hashFiles('cabal.project') }}
        restore-keys: |
             ${{ runner.os }}-x64-cabal-index-

    - name: Install ghcup, ghc, cabal
      run: |
        echo "$HOME/.ghcup/bin" >> $GITHUB_PATH
        # pin CABAL_DIR so cabal uses ~/.cabal (not XDG dirs) - keeps the cache paths above correct
        echo "CABAL_DIR=$HOME/.cabal" >> $GITHUB_ENV
        export PATH="$HOME/.ghcup/bin:$PATH"
        if [ ! -x ~/.ghcup/bin/ghcup ];      then mkdir -p ~/.ghcup/bin && curl https://downloads.haskell.org/~ghcup/x86_64-linux-ghcup > ~/.ghcup/bin/ghcup && chmod +x ~/.ghcup/bin/ghcup; fi; printf "ghcup: "; ghcup --version
        if [ ! -x ~/.ghcup/bin/ghc-$ghc ];   then ghcup install ghc $ghc     && ghcup set ghc $ghc;     fi; printf "ghc: ";   ghc   --version
        if [ ! -x ~/.ghcup/bin/cabal ];      then ghcup install cabal $cabal && ghcup set cabal $cabal; fi; printf "cabal: "; cabal --version

    - name: Update cabal package index
      run: |
        cabal update

    - name: Cache - shelltestrunner binary (built once, then reused)
      uses: actions/cache@v6
      with:
        path: ~/.local/bin/shelltest
        key: ${{ runner.os }}-x64-shelltest-1.11-${{ env.ghc }}

    - name: Build with cabal (statically linked)
      run: |
        cabal build --enable-executable-static --ghc-options=-Werror hledger hledger-ui hledger-web

    - name: Test (functional + unit tests via shelltest)
      run: |
        mkdir -p "$HOME/.local/bin"
        export PATH="$HOME/.local/bin:$PATH"
        for e in hledger hledger-ui hledger-web; do cp "$(cabal list-bin $e)" "$HOME/.local/bin/"; done
        command -v shelltest >/dev/null || cabal install --overwrite-policy=always --install-method=copy --installdir "$HOME/.local/bin" shelltestrunner-1.11
        shelltest --version
        # -x journal/include/include.test: this Alpine job runs as root, where chmod -r is ignored,
        # so include.test's "unreadable file -> permission denied" case can't hold.
        COLUMNS=80 shelltest --execdir -j16 hledger/test -x /_ -x /addons -x journal/include/include.test -x ledger-compat/ledger-baseline -x ledger-compat/ledger-regress -x ledger-compat/ledger-collected

    - name: Gather binaries
      run: |
        mkdir tmp
        cp $(cabal list-bin hledger)     tmp
        cp $(cabal list-bin hledger-ui)  tmp
        cp $(cabal list-bin hledger-web) tmp
        cp hledger/embeddedfiles/*.1     tmp
        cp hledger/embeddedfiles/*.info  tmp
        cp hledger/shell-completion/hledger-completion.bash tmp
        strip tmp/hledger tmp/hledger-ui tmp/hledger-web
        cd tmp
        tar cvf hledger-linux-x64.tar hledger hledger-ui hledger-web *.1 *.info hledger-completion.bash
        # verify the binaries run, pass their unit tests, and are actually static
        for e in hledger hledger-ui hledger-web; do
          file "$e"
          if ldd "$e" 2>&1 | grep -qi "not.*dynamic"; then echo "$e: statically linked"; else echo "$e dependencies:"; ldd "$e"; fi
          "./$e" --version
        done

    # upload-artifact loses execute permissions, so we tar the binaries to preserve them.
    - name: Upload binaries
      uses: actions/upload-artifact@v7
      with:
        name: hledger-linux-x64
        path: tmp/hledger-linux-x64.tar
