# TRIGGER: Runs on any push to binaries-linux-x64-static-hx or binaries branches.
# ACTION: Builds and saves linux x64 static binaries with hx, in an Alpine (musl) container.
#
# EXPERIMENTAL - the static-via-hx path has three unproven assumptions, flagged inline below:
#   1. hx can provide a musl-compatible GHC in Alpine (its default direct-download GHC is glibc);
#      if not, fall back to installing GHC via ghcup (see the commented block), which knows about musl.
#   2. hx passes hx.toml [build] ghc_flags through to cabal/ghc (needed for -optl-static).
#   3. -optl-static (+ the alpine *-static libs) is sufficient; the stack/cabal workflow instead
#      uses cabal's --enable-executable-static, which hx build does not expose.

name: binaries-linux-x64-static-hx
on:
  push:
    branches: [ binaries-linux-x64-static-hx, binaries ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    container: alpine:latest   # provides musl, the statically-linkable libc

    defaults:
      run:
        shell: bash

    env:
      GH_TOKEN: ${{ github.token }}   # lets `gh release download` authenticate & dodge rate limits
      HX_AUTO_INSTALL: "true"         # install missing GHC toolchain without prompting (hx wants true/false, not 1)
      ghc: "9.14.1"                   # matches hx.toml [toolchain] ghc / stack.yaml compiler
      cabal: "3.16.1.0"               # cabal-install version to fetch (official binary)
      hxasset: "x86_64-unknown-linux-musl.tar.gz"   # hx musl release asset (runs in Alpine)
      cabalarch: "x86_64-linux-alpine3_22"          # cabal-install musl bindist for Alpine

    steps:

    - name: Show platform info
      run: |
        arch
        uname -a

    - name: Install system build deps (incl. static libs)
      run: |
        apk --no-cache add \
          bash ca-certificates curl xz tar git make perl file findutils \
          gcc g++ binutils-gold \
          gmp-dev gmp-static libffi-dev zlib-dev zlib-static ncurses-dev ncurses-static

    - name: Check out
      uses: actions/checkout@v7
      # have to fetch everything for git describe for --version
      with:
        fetch-depth: 0

    - name: Check embedded files
      run: |
        tools/checkembeddedfiles

    - name: Enable static linking in hx.toml (working copy only)
      run: |
        # Add static linker flags under [build]. This mutates the checked-out hx.toml only (disposable in CI),
        # so the shared config used by the dynamic builds is unaffected.
        # ASSUMPTION 2/3: hx forwards [build] ghc_flags to cabal, and -optl-static links statically.
        sed -i '/^\[build\]/a ghc_flags = ["-optl-static", "-optl-pthread"]' hx.toml
        cat hx.toml

    - name: Cache - hx toolchains (GHC bindist)
      uses: actions/cache@v6
      with:
        path: ~/.hx
        key: ${{ runner.os }}-x64-static-hx-toolchain-${{ env.ghc }}

    - name: Cache - hx compiled dependency store
      uses: actions/cache@v6
      with:
        # NB: hx's store dir on linux is a best guess (XDG cache); verify on first run.
        path: ~/.cache/io.raskell.hx
        key: ${{ runner.os }}-x64-static-hx-store-${{ env.ghc }}-${{ hashFiles('hx.lock') }}
        restore-keys: |
             ${{ runner.os }}-x64-static-hx-store-${{ env.ghc }}-

    - name: Cache - cabal Hackage index (used by the system cabal)
      uses: actions/cache@v6
      with:
        path: ~/.cache/cabal
        key: ${{ runner.os }}-x64-static-cabal-index-${{ hashFiles('hx.lock') }}
        restore-keys: |
             ${{ runner.os }}-x64-static-cabal-index-

    - name: Cache - cabal binary
      uses: actions/cache@v6
      with:
        path: ~/.local/bin/cabal
        key: ${{ runner.os }}-x64-static-cabal-bin-${{ env.cabal }}

    # NB: the project build (.hx/cabal/dist-newstyle) is deliberately NOT cached (stale --version commit otherwise).

    - name: Ensure ~/.local/bin exists and is in PATH
      run: |
        mkdir -p "$HOME/.local/bin"
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Install hx (latest release)
      run: |
        mkdir -p /tmp/hxdl
        gh release download --repo arcanist-sh/hx --pattern "*$hxasset" --dir /tmp/hxdl --clobber
        tar xzf /tmp/hxdl/*"$hxasset" -C /tmp/hxdl
        install -m 755 "$(find /tmp/hxdl -type f -name hx | head -1)" "$HOME/.local/bin/hx"
        hx --version
        hx doctor || true

    - name: Install GHC and cabal
      run: |
        # ASSUMPTION 1: hx provides a musl GHC here. If it direct-downloads a glibc GHC that
        # won't run in Alpine, replace this line with a ghcup install of the musl GHC, e.g.:
        #   mkdir -p ~/.ghcup/bin && curl https://downloads.haskell.org/~ghcup/x86_64-linux-ghcup > ~/.ghcup/bin/ghcup && chmod +x ~/.ghcup/bin/ghcup
        #   ~/.ghcup/bin/ghcup install ghc "$ghc" && ~/.ghcup/bin/ghcup set ghc "$ghc"
        #   echo "$HOME/.ghcup/bin" >> $GITHUB_PATH   # so hx detects it as a system toolchain
        hx toolchain install --set "$ghc"
        # fetch the official musl cabal into ~/.local/bin unless already present (from the cabal-binary cache)
        if ! command -v cabal >/dev/null; then
          mkdir -p /tmp/cabaldl
          curl -fsSL "https://downloads.haskell.org/cabal/cabal-install-$cabal/cabal-install-$cabal-$cabalarch.tar.xz" -o /tmp/cabaldl/cabal.tar.xz
          tar xJf /tmp/cabaldl/cabal.tar.xz -C /tmp/cabaldl
          install -m 755 "$(find /tmp/cabaldl -type f -name cabal | head -1)" "$HOME/.local/bin/cabal"
        fi
        cabal --version
        cabal update
        hx toolchain status || true

    - name: List dependencies
      run: |
        hx list

    - name: Build hledger
      #and run unit + doc tests
      run: |
        hx build
        # hx test

    - name: Collect built binaries onto PATH
      run: |
        for exe in hledger hledger-ui hledger-web; do
          bin=$(find .hx/cabal/dist-newstyle -type f -name "$exe" -path "*/x/$exe/*build/$exe/$exe" | head -1)
          if [[ -z "$bin" ]]; then
            echo "ERROR: $exe executable not found under .hx/cabal/dist-newstyle" >&2
            find .hx/cabal/dist-newstyle -type f -name "$exe" >&2 || true
            exit 1
          fi
          echo "$exe -> $bin"
          cp "$bin" "$HOME/.local/bin/$exe"
        done
        hledger --version

    - name: Install shelltestrunner
      run: |
        command -v shelltest >/dev/null || cabal install --overwrite-policy=always shelltestrunner-1.11
        shelltest --version

    - name: Test functional tests (excluding addons)
      run: |
        COLUMNS=80 shelltest --execdir -j16 hledger/test -x /_ -x /addons -x ledger-compat/ledger-baseline -x ledger-compat/ledger-regress -x ledger-compat/ledger-collected

    # artifacts:

    - name: Gather binaries
      run: |
        mkdir tmp
        cp ~/.local/bin/hledger tmp
        cp ~/.local/bin/hledger-ui tmp
        cp ~/.local/bin/hledger-web tmp
        cp hledger/embeddedfiles/*.1 tmp
        cp hledger/embeddedfiles/*.info tmp
        cp hledger/shell-completion/hledger-completion.bash tmp
        strip tmp/hledger
        strip tmp/hledger-ui
        strip tmp/hledger-web
        cd tmp
        tar cvf hledger-linux-x64-static.tar hledger hledger-ui hledger-web *.1 *.info hledger-completion.bash
        for exe in hledger hledger-ui hledger-web; do
          file "$exe"
          if ldd "$exe" 2>&1 | grep -qi "not.*dynamic"; then echo "$exe: statically linked"; else echo "$exe dependencies:"; ldd "$exe"; fi
          "./$exe" --version
        done

    # upload-artifact loses execute permissions, so we tar the binaries to preserve them.
    - name: Upload binaries artifact
      uses: actions/upload-artifact@v7
      with:
        name: hledger-linux-x64-static
        path: tmp/hledger-linux-x64-static.tar
